<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk Admin</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="login-overlay" class="overlay hidden">
  <form id="login-form" class="panel">
    <h1>Kiosk Admin</h1>
    <input type="text" id="login-username" placeholder="Username" value="admin" autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    <p id="login-error" class="error"></p>
  </form>
</div>

<header>
  <h1>Kiosk Admin <span id="version" class="muted"></span></h1>
  <span id="whoami" class="muted"></span>
  <div class="spacer"></div>
  <button id="btn-adduser" class="primary admin-only">+ Add user</button>
  <button id="btn-logout" class="ghost">Sign out</button>
</header>

<main>
  <section>
    <h2>Active sessions <span id="session-count" class="muted"></span></h2>
    <div id="sessions" class="grid"></div>
    <p id="no-sessions" class="muted hidden">No one is logged in over RDP right now.</p>
  </section>

  <section class="admin-only">
    <h2>Kiosk users</h2>
    <table id="users-table">
      <thead><tr><th>User</th><th>Status</th><th class="right">Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="admin-only">
    <div class="sec-head">
      <h2>Console users</h2>
      <button id="btn-addwebuser">+ Console user</button>
    </div>
    <p class="muted">Accounts for this web interface. Role <b>admin</b> = full control;
       <b>viewer</b> = can only watch &amp; control screens remotely.</p>
    <table id="webusers-table">
      <thead><tr><th>User</th><th>Role</th><th class="right">Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<div id="modal-overlay" class="overlay hidden">
  <form id="modal-form" class="panel">
    <h2 id="modal-title">Add user</h2>
    <input type="text" id="modal-username" placeholder="username (a-z, 0-9, - _)" autocomplete="off">
    <input type="password" id="modal-password" placeholder="password (min 6 chars)" autocomplete="new-password" required>
    <select id="modal-role" class="hidden">
      <option value="viewer">viewer — watch &amp; control screens only</option>
      <option value="admin">admin — full control</option>
    </select>
    <div class="row">
      <button type="submit" class="primary">Save</button>
      <button type="button" id="modal-cancel" class="ghost">Cancel</button>
    </div>
    <p id="modal-error" class="error"></p>
  </form>
</div>

<div id="toast" class="hidden"></div>

<script src="/app.js"></script>
</body>
</html>
