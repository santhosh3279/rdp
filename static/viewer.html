<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk viewer</title>
<link rel="stylesheet" href="/style.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  #toolbar {
    display: flex; align-items: center; gap: .75rem;
    padding: .5rem 1rem; background: #16162a; border-bottom: 1px solid #2a2a45;
  }
  #screen { height: calc(100% - 52px); background: #000; }
  #status.ok { color: #4ade80; }
  #status.bad { color: #f87171; }
  /* touch mode: finger-sized toolbar controls */
  body.touch #toolbar { padding: .6rem 1rem; }
  body.touch #toolbar button { min-height: 44px; padding: .6rem 1.1rem; font-size: 1rem; }
  body.touch #toolbar label { font-size: 1rem; }
  body.touch #toolbar input[type="checkbox"] { width: 22px; height: 22px; }
  body.touch #screen { height: calc(100% - 68px); }
</style>
</head>
<body>
<div id="toolbar">
  <a href="/" class="ghost-link">&larr; dashboard</a>
  <strong id="who"></strong>
  <span id="status">connecting&hellip;</span>
  <div class="spacer"></div>
  <label class="muted"><input type="checkbox" id="touchmode"> touch screen</label>
  <label class="muted"><input type="checkbox" id="viewonly"> view only</label>
  <button id="btn-refresh" title="Send Ctrl+Shift+R">Refresh page</button>
  <button id="btn-reset" title="Kill &amp; relaunch browser, clean profile">Reset browser</button>
  <button id="btn-reconnect" class="hidden">Reconnect</button>
</div>
<div id="screen"></div>
<div id="toast" class="hidden"></div>
<script type="module" src="/viewer.js"></script>
</body>
</html>
