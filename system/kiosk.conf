# /etc/kiosk/kiosk.conf -- kiosk deployment settings.
# This file is created once and never overwritten by upgrades.
# Changes apply the next time each user's browser (re)starts; use the
# admin console's "Reset" button to apply immediately.

# The tabs every kiosk user gets, space-separated, opened left to right.
# One URL = one tab; 5 tabs by default. The tab strip is the ONLY browser
# UI the user sees -- no address bar, no menus.
KIOSK_URLS="https://example.com https://example.org https://example.net https://en.wikipedia.org https://duckduckgo.com"

# no  = keep cookies/state, so users STAY signed in to websites across browser
#       restarts and RDP logins/logouts. The admin console's "Reset" button
#       still forces a full wipe either way. (default)
# yes = wipe the browser profile on every (re)start: no history, no cookies --
#       users must sign in to websites again after every RDP login.
KIOSK_FRESH_PROFILE="no"

# yes = Firefox offers to save website logins, and saved logins SURVIVE
#       profile wipes and admin "Reset" (only logins.json/key4.db are carried
#       over). no = never save passwords, wipe any that exist.
KIOSK_SAVE_LOGINS="yes"

# Seconds to wait before relaunching a closed/crashed browser
KIOSK_RESTART_DELAY="2"

# Desktop background color behind the browser
KIOSK_BG="#1a1a2e"

# NumLock state inside the session at login: on, off, or leave (don't touch).
# RDP starts the session out of sync with the client keyboard's LED, so
# pinning it avoids the "numlock works backwards" effect.
KIOSK_NUMLOCK="on"

# yes = touch-screen mode for ALL users: the mouse pointer is hidden on the
#       kiosk screen, Firefox gets touch-friendly input handling, and tabs
#       grow to finger size. no = normal mouse/keyboard kiosk.
# Individual users can be switched to touch mode regardless of this setting
# with the "Touch screen" checkbox in the admin console (kiosktouch group).
KIOSK_TOUCH_MODE="no"
